version: '3.8'

services:
  db:
    image: postgres:15
    container_name: picpay_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: picpay
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: picpay_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"